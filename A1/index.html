
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./Assets/favicon-96x96.png" type="image/x-icon">

<body>
     <main class="card">

                <h1>Pikachu</h1>
                <p>Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and
                    incredibly
                    cute mouse-like Pokémon. They are almost completely covered by yellow fur.</p>
                <p class="bottomtext"> —— &nbsp; 01 / 08</p>

            <i class="ri-menu-line"></i>
            <img id="pikachu-img" src="./Assets/pikachu.png" alt="pikachu" loading="lazy">

            <div class="circle-container">
